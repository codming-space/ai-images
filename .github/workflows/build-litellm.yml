name: Build Custom LiteLLM Docker Image
on:
  workflow_dispatch:
    inputs:
      tag:
        description: "The tag version you want to build from upstream"
        required: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/litellm

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
            arch: amd64
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
            arch: arm64
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
    steps:
      - name: Set up environment
        run: |
          echo "Building custom LiteLLM with tag: ${{ github.event.inputs.tag }} on ${{ matrix.platform }}"

      - name: Checkout upstream LiteLLM repository
        uses: actions/checkout@v6
        with:
          repository: 'BerriAI/litellm'
          ref: ${{ github.event.inputs.tag }}
          path: 'upstream'

      - name: Checkout override files repository
        uses: actions/checkout@v6
        with:
          path: 'overrides'

      - name: Apply override files
        run: |
          echo "Downloading latest model_prices_and_context_window.json from main branch"
          curl -sL https://raw.githubusercontent.com/BerriAI/litellm/refs/heads/main/model_prices_and_context_window.json \
            -o overrides/litellm/${{ github.event.inputs.tag }}/model_prices_and_context_window.json
          echo "Config file downloaded successfully"

          echo "Applying override files for version ${{ github.event.inputs.tag }}"
          if [ -d "overrides/litellm/${{ github.event.inputs.tag }}" ]; then
            echo "Found override directory for ${{ github.event.inputs.tag }}"

            echo "Files in override directory:"
            find overrides/litellm/${{ github.event.inputs.tag }} -type f

            echo ""
            echo "=========================================="
            echo "Showing diff for each override file:"
            echo "=========================================="

            find overrides/litellm/${{ github.event.inputs.tag }} -type f | while read override_file; do
              relative_path="${override_file#overrides/litellm/${{ github.event.inputs.tag }}/}"
              upstream_file="upstream/${relative_path}"

              echo ""
              echo "📄 Diff for: ${relative_path}"
              echo "----------------------------------------"

              if [ -f "$upstream_file" ]; then
                echo "Showing changes (- original, + override):"
                diff -u "$upstream_file" "$override_file" || true
              else
                echo "🆕 New file being added:"
                echo "Content:"
                cat "$override_file"
              fi
              echo "----------------------------------------"
            done

            echo ""
            echo "=========================================="
            echo "Applying override files..."
            echo "=========================================="

            cp -r overrides/litellm/${{ github.event.inputs.tag }}/* upstream/
            echo "Override files copied successfully"

          else
            echo "No override directory found for ${{ github.event.inputs.tag }}, proceeding with original upstream code"
          fi

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: ./upstream
          file: ./upstream/Dockerfile
          platforms: ${{ matrix.platform }}
          labels: ${{ steps.meta.outputs.labels }}
          outputs: type=image,name=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }},push-by-digest=true,name-canonical=true,push=true
          provenance: false
          sbom: false

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digests-${{ matrix.arch }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      packages: write
    steps:
      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digests-*
          merge-multiple: true

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Create manifest list and push
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create \
            -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.event.inputs.tag }} \
            -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest \
            $(printf '${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@sha256:%s ' *)

      - name: Inspect image
        run: |
          docker buildx imagetools inspect ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.event.inputs.tag }}
